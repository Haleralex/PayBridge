# Fly.io config for NATS JetStream broker
# Internal-only service — not publicly accessible
app = "paybridge-nats"
primary_region = "fra"

[build]
  image = "nats:alpine"

[processes]
  app = "--jetstream --store_dir /data --http_port 8222"

[[mounts]]
  source = "nats_data"
  destination = "/data"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "get"
    path = "/healthz"
    port = 8222
    timeout = "5s"
    type = "http"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
